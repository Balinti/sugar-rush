<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

/* ── dimensions ─────────────────────────────────────── */
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const wrap = canvas.parentElement;
  W = wrap.clientWidth  || Math.min(window.innerWidth,  420);
  H = wrap.clientHeight || Math.min(window.innerHeight, 750);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  canvas.width  = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  if (state === 'start') initDemo();
}
window.addEventListener('resize', resize);

/* ── state ───────────────────────────────────────────── */
let state = 'start';          // 'start' | 'playing' | 'gameover'
let score = 0;
let bestScore = +localStorage.getItem('sugarSnap_best') || 0;
let cracks = 3;               // lives remaining

let crystals  = [];
let spikes    = [];
let particles = [];
let popups    = [];
let demoCrystals = [];

let spawnTimer = 0;
let shakeTime  = 0;
let shakeMag   = 0;
let lastTs     = 0;
let hueIdx     = 0;

/* ── difficulty ──────────────────────────────────────── */
function getDiff() {
  if (score <= 30)  return { si: 3.5, gr: 1.0 };
  if (score <= 80)  return { si: 2.8, gr: 1.2 };
  if (score <= 200) return { si: 2.2, gr: 1.5 };
  return { si: 1.6, gr: 2.0 };
}

/* ── utils ───────────────────────────────────────────── */
function dist(ax, ay, bx, by) { return Math.hypot(bx - ax, by - ay); }

function makeVerts(n) {
  const v = [];
  for (let i = 0; i < n; i++)
    v.push({ a: (i / n) * Math.PI * 2, f: 0.7 + Math.random() * 0.6 });
  return v;
}

function buildPath(verts, r) {
  ctx.beginPath();
  for (let i = 0; i < verts.length; i++) {
    const vr = r * verts[i].f;
    const x  = Math.cos(verts[i].a) * vr;
    const y  = Math.sin(verts[i].a) * vr;
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
}

/* ── crystal factory ─────────────────────────────────── */
function spawnCrystal() {
  if (crystals.filter(c => !c.snapping).length >= 8) return;
  const m = 80;
  let x, y, tries = 0;
  do {
    x = m + Math.random() * (W - m * 2);
    y = m + Math.random() * (H - m * 2);
  } while (++tries < 30 && crystals.some(c => dist(c.x, c.y, x, y) < 120));

  hueIdx = (hueIdx + 37) % 360;
  const diff = getDiff();
  crystals.push({
    x, y,
    r: 0, maxR: 80,
    gr: (80 / 6) * diff.gr,   // px / sec
    hue: hueIdx,
    verts: makeVerts(7 + (Math.random() * 5 | 0)),
    pulse: 0,
    snapping: false, snapR: 0, snapT: 0
  });
}

function initDemo() {
  demoCrystals = [
    { x: W * 0.22, y: H * 0.52, r: 35, hue: 300, verts: makeVerts(8), phase: 0 },
    { x: W * 0.50, y: H * 0.38, r: 28, hue: 180, verts: makeVerts(9), phase: 1.5 },
    { x: W * 0.78, y: H * 0.56, r: 32, hue:  60, verts: makeVerts(7), phase: 3.0 }
  ];
}

/* ── draw crystal ────────────────────────────────────── */
function drawCrystal(c, alpha) {
  if (alpha === undefined) alpha = 1;
  const r = c.r;
  if (r < 0.5) return;

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(c.x, c.y);

  // soft glow halo
  const glR = r * 1.7;
  const gl  = ctx.createRadialGradient(0, 0, r * 0.2, 0, 0, glR);
  gl.addColorStop(0, `hsla(${c.hue},100%,65%,0.22)`);
  gl.addColorStop(1, `hsla(${c.hue},100%,65%,0)`);
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.arc(0, 0, glR, 0, Math.PI * 2);
  ctx.fill();

  // crystal body
  buildPath(c.verts, r);

  const fg = ctx.createRadialGradient(0, 0, 0, 0, 0, r);
  fg.addColorStop(0, `hsla(${c.hue},100%,88%,0.95)`);
  fg.addColorStop(1, `hsla(${c.hue},100%,52%,0.88)`);
  ctx.fillStyle = fg;
  ctx.fill();

  // fusion warning pulse: white overlay
  if (c.pulse > 0) {
    ctx.fillStyle = `rgba(255,255,255,${c.pulse * 0.55})`;
    buildPath(c.verts, r);
    ctx.fill();
  }

  ctx.strokeStyle = `hsla(${c.hue},100%,92%,0.65)`;
  ctx.lineWidth   = 1.5;
  buildPath(c.verts, r);
  ctx.stroke();

  // score preview label
  if (r > 18 && !c.snapping) {
    const pts = Math.floor(Math.PI * r * r / 100);
    ctx.fillStyle    = 'rgba(255,255,255,0.85)';
    ctx.font         = `bold ${Math.min(16, r * 0.34) | 0}px Arial`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('+' + pts, 0, 0);
  }

  ctx.restore();
}

/* ── draw spike ──────────────────────────────────────── */
function drawSpike(s) {
  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rot);

  // glow
  const gl = ctx.createRadialGradient(0, 0, 4, 0, 0, 42);
  gl.addColorStop(0, 'rgba(255,0,170,0.5)');
  gl.addColorStop(1, 'rgba(255,0,170,0)');
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.arc(0, 0, 42, 0, Math.PI * 2);
  ctx.fill();

  // 8-pointed star
  ctx.beginPath();
  for (let i = 0; i < 16; i++) {
    const r2 = i % 2 === 0 ? 23 : 9;
    const a  = (i / 16) * Math.PI * 2;
    i === 0
      ? ctx.moveTo(Math.cos(a) * r2, Math.sin(a) * r2)
      : ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
  }
  ctx.closePath();
  ctx.fillStyle   = '#FF00AA';
  ctx.fill();
  ctx.strokeStyle = '#FF88EE';
  ctx.lineWidth   = 1.5;
  ctx.stroke();

  ctx.restore();
}

/* ── particles ───────────────────────────────────────── */
function emitSnap(x, y, hue) {
  for (let i = 0; i < 12; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 60 + Math.random() * 90;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     life: 0.4, ml: 0.4, r: 3, c: `hsl(${hue},100%,70%)` });
  }
}

function emitSpike(x, y) {
  for (let i = 0; i < 16; i++) {
    const a   = Math.random() * Math.PI * 2;
    const spd = 80 + Math.random() * 110;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd,
                     life: 0.5, ml: 0.5, r: 5, c: '#FF00AA' });
  }
}

function addPopup(x, y, val) {
  popups.push({ x, y, val, life: 0.6, ml: 0.6 });
}

/* ── game actions ────────────────────────────────────── */
function snap(c) {
  const pts = Math.floor(Math.PI * c.r * c.r / 100);
  score += pts;
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('sugarSnap_best', bestScore);
  }
  emitSnap(c.x, c.y, c.hue);
  addPopup(c.x, c.y - c.r * 0.6, pts);
  c.snapping = true;
  c.snapR    = c.r;
  c.snapT    = 0.15;
}

function createSpike(x, y) {
  spikes.push({
    x, y,
    rot:    0,
    rotSpd: (Math.random() - 0.5) * 3.5
  });
}

function loseLife() {
  cracks--;
  shakeTime = 0.22;
  shakeMag  = cracks <= 0 ? 14 : 8;
  if (cracks <= 0) gameOver();
}

function gameOver() {
  state = 'gameover';
  localStorage.setItem('sugarSnap_best', bestScore);
}

function startGame() {
  state      = 'playing';
  score      = 0;
  cracks     = 3;
  crystals   = [];
  spikes     = [];
  particles  = [];
  popups     = [];
  spawnTimer = 0;
  shakeTime  = 0;
}

/* ── fusion detection ────────────────────────────────── */
function checkFusion(dt) {
  for (const c of crystals) c.pulse = Math.max(0, c.pulse - dt * 4);

  const rem       = new Set();
  const newSpikes = [];

  for (let i = 0; i < crystals.length; i++) {
    const a = crystals[i];
    if (a.snapping) continue;
    for (let j = i + 1; j < crystals.length; j++) {
      const b = crystals[j];
      if (b.snapping) continue;
      const d    = dist(a.x, a.y, b.x, b.y);
      const sumR = a.r + b.r;
      if (d < sumR) {
        rem.add(i); rem.add(j);
        newSpikes.push([(a.x + b.x) / 2, (a.y + b.y) / 2]);
      } else if (d < sumR + Math.min(a.r, b.r) * 0.15) {
        a.pulse = Math.min(1, a.pulse + dt * 5);
        b.pulse = Math.min(1, b.pulse + dt * 5);
      }
    }
  }

  if (rem.size) {
    [...rem].sort((a, b) => b - a).forEach(i => crystals.splice(i, 1));
    newSpikes.forEach(([x, y]) => createSpike(x, y));
  }
}

/* ── input ───────────────────────────────────────────── */
function onTap(lx, ly) {
  if (state !== 'playing') { startGame(); return; }

  // spikes first
  for (let i = spikes.length - 1; i >= 0; i--) {
    if (dist(lx, ly, spikes[i].x, spikes[i].y) < 34) {
      emitSpike(spikes[i].x, spikes[i].y);
      spikes.splice(i, 1);
      loseLife();
      return;
    }
  }

  // crystals — pick largest hit
  let best = null, bestA = -1;
  for (const c of crystals) {
    if (c.snapping) continue;
    if (dist(lx, ly, c.x, c.y) < c.r + 10) {
      const a = c.r * c.r;
      if (a > bestA) { bestA = a; best = c; }
    }
  }
  if (best) snap(best);
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  onTap(
    (e.clientX - rect.left) / rect.width  * W,
    (e.clientY - rect.top)  / rect.height * H
  );
}, { passive: false });

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    e.preventDefault();
    if (state !== 'playing') startGame();
  }
});

/* ── update ──────────────────────────────────────────── */
function update(dt) {
  if (state !== 'playing') return;

  // spawn
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnCrystal();
    spawnTimer = getDiff().si;
  }

  // grow / snap-shrink crystals
  for (let i = crystals.length - 1; i >= 0; i--) {
    const c = crystals[i];
    if (c.snapping) {
      c.snapT -= dt;
      c.r      = c.snapR * Math.max(0, c.snapT / 0.15);
      if (c.snapT <= 0) crystals.splice(i, 1);
    } else {
      c.r = Math.min(c.maxR, c.r + c.gr * dt);
    }
  }

  checkFusion(dt);

  // spikes home toward center
  const cx = W / 2, cy = H / 2;
  for (let i = spikes.length - 1; i >= 0; i--) {
    const s = spikes[i];
    const a = Math.atan2(cy - s.y, cx - s.x);
    s.x  += Math.cos(a) * 20 * dt;
    s.y  += Math.sin(a) * 20 * dt;
    s.rot += s.rotSpd * dt;
    if (dist(s.x, s.y, cx, cy) < 30) {
      emitSpike(s.x, s.y);
      spikes.splice(i, 1);
      loseLife();
    }
  }

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x    += p.vx * dt;
    p.y    += p.vy * dt;
    p.vx   *= 1 - dt * 3.5;
    p.vy   *= 1 - dt * 3.5;
    p.life -= dt;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // score popups float up
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    p.y    -= 70 * dt;
    p.life -= dt;
    if (p.life <= 0) popups.splice(i, 1);
  }

  if (shakeTime > 0) shakeTime -= dt;
}

/* ── draw helpers ────────────────────────────────────── */
function drawBg() {
  const g = ctx.createRadialGradient(W / 2, H * 0.28, 0, W / 2, H * 0.28, H * 0.85);
  g.addColorStop(0, '#1c0038');
  g.addColorStop(1, '#050008');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawHUD() {
  // score (top-left)
  ctx.fillStyle    = '#ffffff';
  ctx.font         = 'bold 30px Arial';
  ctx.textAlign    = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(score, 14, 12);

  // best (top-right)
  ctx.fillStyle = 'rgba(255,255,255,0.38)';
  ctx.font      = '13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText('BEST ' + bestScore, W - 14, 16);

  // crack icons (top-center)
  const icy = 28, isp = 28;
  for (let i = 0; i < 3; i++) {
    const icx    = W / 2 + (i - 1) * isp;
    const filled = i < cracks;
    ctx.save();
    ctx.translate(icx, icy);
    ctx.beginPath();
    for (let j = 0; j < 6; j++) {
      const a = (j / 6) * Math.PI * 2 - Math.PI / 6;
      j === 0
        ? ctx.moveTo(Math.cos(a) * 9, Math.sin(a) * 9)
        : ctx.lineTo(Math.cos(a) * 9, Math.sin(a) * 9);
    }
    ctx.closePath();
    if (filled) { ctx.fillStyle = '#FF00AA'; ctx.fill(); }
    ctx.strokeStyle = filled ? '#FF88EE' : 'rgba(255,0,170,0.28)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();
    ctx.restore();
  }
}

function drawParticles() {
  for (const p of particles) {
    const t = p.life / p.ml;
    ctx.save();
    ctx.globalAlpha = t;
    ctx.fillStyle   = p.c;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.1, p.r * t), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawPopups() {
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  for (const p of popups) {
    const t = p.life / p.ml;
    ctx.save();
    ctx.globalAlpha  = t;
    ctx.font         = 'bold 19px Arial';
    ctx.strokeStyle  = 'rgba(0,0,0,0.55)';
    ctx.lineWidth    = 3;
    ctx.strokeText('+' + p.val, p.x, p.y);
    ctx.fillStyle    = '#ffffff';
    ctx.fillText('+' + p.val, p.x, p.y);
    ctx.restore();
  }
}

/* ── screens ─────────────────────────────────────────── */
function drawStart() {
  drawBg();
  const t = performance.now() / 1000;

  // animated demo crystals (no fusion logic)
  for (const dc of demoCrystals) {
    dc.r = 24 + Math.sin(t + dc.phase) * 17;
    drawCrystal(dc, 0.32);
  }

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  // title
  ctx.shadowColor = '#FF00AA';
  ctx.shadowBlur  = 38;
  ctx.fillStyle   = '#FF00AA';
  ctx.font        = 'bold 58px Arial Black, Arial';
  ctx.fillText('SUGAR', W / 2, H * 0.365);
  ctx.fillText('SNAP',  W / 2, H * 0.365 + 64);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.52)';
  ctx.font      = '15px Arial';
  ctx.fillText('Grow crystals. Snap before they fuse.', W / 2, H * 0.365 + 112);

  // instructions
  ctx.fillStyle = 'rgba(255,200,255,0.35)';
  ctx.font      = '13px Arial';
  ctx.fillText('Fused crystals become deadly spikes — destroy them at the cost of 1 Crack', W / 2, H * 0.365 + 136);

  // pulsing tap
  ctx.globalAlpha = 0.55 + 0.45 * Math.sin(t * 2.8);
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 21px Arial';
  ctx.fillText('TAP TO START', W / 2, H * 0.72);
  ctx.globalAlpha = 1;

  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font      = '14px Arial';
    ctx.fillText('Best: ' + bestScore, W / 2, H * 0.77);
  }
  ctx.restore();
}

function drawGameOver() {
  drawBg();
  // ghost game state behind overlay
  for (const c of crystals) drawCrystal(c, 0.4);
  for (const s of spikes)   drawSpike(s);

  ctx.fillStyle = 'rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';

  ctx.shadowColor = '#FF00AA';
  ctx.shadowBlur  = 28;
  ctx.fillStyle   = '#FF4488';
  ctx.font        = 'bold 48px Arial Black, Arial';
  ctx.fillText('GAME OVER', W / 2, H * 0.38);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#ffffff';
  ctx.font      = 'bold 36px Arial';
  ctx.fillText(score, W / 2, H * 0.465);

  ctx.fillStyle = 'rgba(255,255,255,0.42)';
  ctx.font      = '16px Arial';
  ctx.fillText('BEST: ' + bestScore, W / 2, H * 0.525);

  const pulse = 0.55 + 0.45 * Math.sin(performance.now() / 1000 * 2.8);
  ctx.globalAlpha = pulse;
  ctx.fillStyle   = '#ffffff';
  ctx.font        = 'bold 21px Arial';
  ctx.fillText('TAP TO RETRY', W / 2, H * 0.645);
  ctx.globalAlpha = 1;

  ctx.restore();
}

/* ── main draw ───────────────────────────────────────── */
function draw() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  if (shakeTime > 0) {
    const intens = shakeMag * Math.min(1, shakeTime / 0.2);
    ctx.translate(
      (Math.random() - 0.5) * intens * 2,
      (Math.random() - 0.5) * intens * 2
    );
  }

  if (state === 'start') {
    drawStart();
  } else if (state === 'playing') {
    drawBg();
    for (const c of crystals) drawCrystal(c);
    for (const s of spikes)   drawSpike(s);
    drawParticles();
    drawPopups();
    drawHUD();
  } else {
    drawGameOver();
  }
}

/* ── game loop ───────────────────────────────────────── */
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.1);
  lastTs = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

/* ── boot ────────────────────────────────────────────── */
resize();
initDemo();
requestAnimationFrame(ts => { lastTs = ts; requestAnimationFrame(loop); });
</script>
